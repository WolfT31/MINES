<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mines Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* === CYBERPUNK THEME === */
       :root {
    --bg-color: #0a0e17;
    --glass: rgba(15, 22, 39, 0.9);
    --glass-border: rgba(0, 247, 255, 0.2);
    --neon-blue: #00f7ff;
    --neon-pink: #ff00ff;
    --neon-green: #00ff9d;
    --neon-red: #ff0055;
    --neon-yellow: #ffcc00;
    --text: #ffffff;
    --text-muted: #8a9bbd;
    --radius: 16px;
    --font-main: 'Poppins', sans-serif;
    --font-cyber: 'Orbitron', monospace;
    
    /* New color variables for bomb buttons */
    --safe-green: #00ff88;
    --danger-red: #ff3355;
    --warning-orange: #ff9900;
    --selection-yellow: #ffff00;
}

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(0, 247, 255, 0.15), transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(255, 0, 255, 0.1), transparent 40%),
                linear-gradient(45deg, rgba(10, 14, 23, 0.9), rgba(20, 25, 40, 0.9));
            color: var(--text); 
            font-family: var(--font-main); 
            margin: 0; 
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Cyber grid background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 247, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 247, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 30px 30px; }
        }

        /* === APP CONTAINER === */
        .app-container {
            max-width: 100%;
            margin: 0 auto;
            padding: 15px;
            position: relative;
        }

        /* === CYBER HEADER === */
        .cyber-header {
            text-align: center;
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(10, 15, 30, 0.8);
            border-radius: var(--radius);
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .cyber-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-pink), transparent);
            animation: scanline 3s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .cyber-header h1 {
            font-family: var(--font-cyber);
            font-size: 2rem;
            margin: 0;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(0, 247, 255, 0.5);
        }

        .cyber-header .subtitle {
            font-family: var(--font-cyber);
            color: var(--neon-green);
            font-size: 0.9rem;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        /* === BOMB SELECTION === */
        .cyber-section {
            background: rgba(15, 22, 39, 0.9);
            border-radius: var(--radius);
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .cyber-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent, rgba(0, 247, 255, 0.1), transparent);
            z-index: 0;
        }

        .section-title {
            font-family: var(--font-cyber);
            font-size: 1rem;
            color: var(--neon-blue);
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-blue), transparent);
        }

        .cyber-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            position: relative;
            z-index: 1;
        }

        .cyber-btn {
    background: rgba(0, 0, 0, 0.4) !important;
    border: 2px solid var(--neon-red);
    color: white;
    padding: 18px 5px;
    border-radius: 12px;
    font-family: var(--font-cyber);
    font-weight: 700;
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    overflow: hidden;
    letter-spacing: 1px;
}

/* Safe bombs (2, 3) - Green outline */
.cyber-btn.safe-bomb {
    border-color: var(--safe-green) !important;
    box-shadow: 0 0 10px rgba(0, 255, 136, 0.3) !important;
}

/* High risk bombs (5, 6, 7) - Red outline */
.cyber-btn.high-risk {
    border-color: var(--danger-red) !important;
    box-shadow: 0 0 10px rgba(255, 51, 85, 0.3) !important;
}

.cyber-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
    opacity: 0;
    transition: opacity 0.3s;
}

.cyber-btn:hover {
    background: rgba(0, 0, 0, 0.4) !important;
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 10px 25px rgba(255, 255, 255, 0.3) !important;
}

.cyber-btn:hover::after {
    opacity: 1;
}

.cyber-btn.selected {
    background: rgba(0, 0, 0, 0.4) !important;
    border-color: var(--selection-yellow) !important;
    box-shadow: 
        0 0 20px rgba(255, 255, 0, 0.5),
        inset 0 0 20px rgba(255, 255, 0, 0.2) !important;
    transform: translateY(-3px) scale(1.05);
    animation: bombPulse 2s infinite;
}

        @keyframes bombPulse {
    0%, 100% { 
        box-shadow: 
            0 0 20px rgba(255, 255, 0, 0.5),
            inset 0 0 20px rgba(255, 255, 0, 0.2); 
        border-color: var(--selection-yellow); 
    }
    50% { 
        box-shadow: 
            0 0 30px rgba(255, 255, 0, 0.7),
            inset 0 0 30px rgba(255, 255, 0, 0.3); 
        border-color: var(--selection-yellow);
    }
}

        .cyber-btn.selected::after {
            content: '✓';
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neon-green);
            font-weight: bold;
            font-size: 1rem;
            text-shadow: 0 0 10px var(--neon-green);
            opacity: 1;
        }

        /* === GAME GRID === */
        .game-grid-section {
            min-height: 400px;
        }

        .cyber-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 20px auto;
            max-width: 350px;
            position: relative;
        }

        .grid-cell {
            aspect-ratio: 1;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-cyber);
            font-weight: 700;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid rgba(0, 247, 255, 0.2);
            position: relative;
            overflow: hidden;
            perspective: 1000px;
        }

        .grid-cell::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent, rgba(0, 247, 255, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .grid-cell:hover::before {
            opacity: 1;
        }

        .grid-cell.loading {
            animation: cellLoading 1.5s ease-in-out;
        }

        @keyframes cellLoading {
            0% { transform: scale(1) rotate(0deg); opacity: 0.5; }
            25% { transform: scale(0.9) rotate(5deg); opacity: 0.7; }
            50% { transform: scale(1.1) rotate(-5deg); opacity: 0.9; }
            75% { transform: scale(0.95) rotate(2deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .grid-cell.revealed {
            animation: flipReveal 0.6s ease-out forwards;
            cursor: default;
        }

        @keyframes flipReveal {
            0% { transform: rotateY(0deg) scale(1); }
            50% { transform: rotateY(90deg) scale(0.9); }
            100% { transform: rotateY(0deg) scale(1); }
        }

        .grid-cell.mine {
            background: rgba(255, 0, 85, 0.3);
            border-color: var(--neon-red);
            color: white;
            text-shadow: 0 0 10px var(--neon-red);
            box-shadow: 
                inset 0 0 20px rgba(255, 0, 85, 0.3),
                0 0 20px rgba(255, 0, 85, 0.4);
            animation: mineGlow 2s infinite;
        }

        @keyframes mineGlow {
            0%, 100% { box-shadow: inset 0 0 20px rgba(255, 0, 85, 0.3), 0 0 20px rgba(255, 0, 85, 0.4); }
            50% { box-shadow: inset 0 0 30px rgba(255, 0, 85, 0.4), 0 0 30px rgba(255, 0, 85, 0.6); }
        }

        .grid-cell.safe {
            background: rgba(0, 255, 157, 0.2);
            border-color: var(--neon-green);
            color: white;
            box-shadow: 
                inset 0 0 20px rgba(0, 255, 157, 0.2),
                0 0 15px rgba(0, 255, 157, 0.3);
        }

        .grid-cell.recommended {
            position: relative;
            overflow: visible;
        }

        .grid-cell.recommended::after {
            content: '✰';
            position: absolute;
            top: -20px;
            right: -10px;
            font-size: 1.2rem;
            animation: firePulse 1s infinite alternate;
            filter: drop-shadow(0 0 5px orange);
            z-index: 2;
        }

        @keyframes firePulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        .grid-cell.best-choice {
            background: linear-gradient(45deg, rgba(0, 255, 157, 0.3), rgba(0, 247, 255, 0.3));
            border-color: var(--neon-yellow);
            box-shadow: 
                0 0 25px rgba(255, 204, 0, 0.4),
                inset 0 0 25px rgba(255, 204, 0, 0.2);
            animation: bestChoiceGlow 3s infinite alternate;
        }

        @keyframes bestChoiceGlow {
            0% { box-shadow: 0 0 25px rgba(255, 204, 0, 0.4), inset 0 0 25px rgba(255, 204, 0, 0.2); }
            100% { box-shadow: 0 0 35px rgba(255, 204, 0, 0.6), inset 0 0 35px rgba(255, 204, 0, 0.3); }
        }

        /* === PREDICTION DISPLAY === */
        .prediction-panel {
            min-height: 100px;
            background: rgba(15, 22, 39, 0.9);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .prediction-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 247, 255, 0.05), transparent);
            animation: scan 10s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .prediction-content {
            position: relative;
            z-index: 1;
        }

        .prediction-title {
            font-family: var(--font-cyber);
            color: var(--neon-blue);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .prediction-text {
            color: var(--text);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .cyber-highlight {
            color: var(--neon-green);
            font-weight: 600;
            text-shadow: 0 0 10px rgba(0, 255, 157, 0.5);
        }

        .danger-highlight {
            color: var(--neon-red);
            font-weight: 600;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
        }

        .recommendation-badge {
            display: inline-block;
            background: linear-gradient(45deg, var(--neon-yellow), var(--neon-green));
            color: #000;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-left: 10px;
            animation: badgePulse 2s infinite;
        }

        @keyframes badgePulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .stat-item {
            text-align: center;
            padding: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            border: 1px solid var(--glass-border);
        }

        .stat-value {
            font-family: var(--font-cyber);
            color: var(--neon-blue);
            font-size: 1.2rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* === ACTION BUTTONS === */
        .action-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            position: fixed;
            bottom: 20px;
            left: 15px;
            right: 15px;
            z-index: 100;
        }

        .cyber-action-btn {
            padding: 20px;
            border-radius: var(--radius);
            font-family: var(--font-cyber);
            font-weight: 700;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .cyber-action-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .cyber-action-btn:hover::before {
            opacity: 1;
        }

        .cyber-action-btn:active {
            transform: scale(0.95);
        }

        .start-btn {
            background: linear-gradient(135deg, var(--neon-green), #00a86b);
            color: #000;
            box-shadow: 0 10px 30px rgba(0, 255, 157, 0.3);
            border: 2px solid var(--neon-green);
        }

        .start-btn:hover {
            background: linear-gradient(135deg, #00ff9d, #00c851);
            box-shadow: 0 15px 40px rgba(0, 255, 157, 0.5);
            transform: translateY(-3px);
        }

        .reset-btn {
            background: linear-gradient(135deg, var(--neon-blue), #0066ff);
            color: #000;
            box-shadow: 0 10px 30px rgba(0, 247, 255, 0.3);
            border: 2px solid var(--neon-blue);
        }

        .reset-btn:hover {
            background: linear-gradient(135deg, #00f7ff, #0099ff);
            box-shadow: 0 15px 40px rgba(0, 247, 255, 0.5);
            transform: translateY(-3px);
        }

        .cyber-action-btn i {
            font-size: 1.2rem;
        }

        /* === LOADING OVERLAY === */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 14, 23, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .cyber-loader {
            width: 80px;
            height: 80px;
            position: relative;
            margin-bottom: 30px;
        }

        .cyber-loader::before,
        .cyber-loader::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 4px solid transparent;
        }

        .cyber-loader::before {
            border-top-color: var(--neon-blue);
            animation: spin 1.5s linear infinite;
        }

        .cyber-loader::after {
            border-bottom-color: var(--neon-pink);
            animation: spin 2s linear infinite reverse;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-family: var(--font-cyber);
            color: var(--neon-blue);
            font-size: 1.2rem;
            text-align: center;
            animation: textGlitch 3s infinite;
        }

        @keyframes textGlitch {
            0%, 100% { text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue); }
            25% { text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink); }
            50% { text-shadow: 0 0 10px var(--neon-green), 0 0 20px var(--neon-green); }
            75% { text-shadow: 0 0 10px var(--neon-yellow), 0 0 20px var(--neon-yellow); }
        }

        /* === RESPONSIVE === */
        @media (min-width: 768px) {
            .app-container {
                max-width: 500px;
                padding: 25px;
            }
            
            .cyber-grid {
                gap: 12px;
                max-width: 400px;
            }
            
            .action-panel {
                position: relative;
                bottom: auto;
                left: auto;
                right: auto;
                margin-top: 30px;
            }
        }

/* ===== DISABLE TEXT SELECTION ===== */
body, .app-container, .cyber-header, .cyber-section, .cyber-btn, 
.grid-cell, .prediction-panel, .action-panel, .stat-item,
.cyber-grid, .prediction-content, .stats-grid, .cyber-action-btn,
.loading-overlay, .loading-text, .prediction-title, .recommendation-badge,
.section-title, .cyber-buttons, .stat-value, .stat-label {

    -ms-user-select: none;      /* IE/Edge */

    -webkit-touch-callout: none; /* iOS Safari */
}

    <script>
    // ===== DISABLE COPY/CUT/RIGHT-CLICK =====
document.addEventListener('DOMContentLoaded', function() {
    
    // Prevent context menu (right-click)
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        return false;
    }, { passive: false });

    // Prevent copy events
    document.addEventListener('copy', function(e) {
        e.preventDefault();
        return false;
    }, { passive: false });

    // Prevent cut events
    document.addEventListener('cut', function(e) {
        e.preventDefault();
        return false;
    }, { passive: false });

    // Prevent drag start
    document.addEventListener('dragstart', function(e) {
        e.preventDefault();
        return false;
    }, { passive: false });

    // Prevent keyboard shortcuts (Ctrl+C, Ctrl+A, Ctrl+X, Ctrl+S, Ctrl+P)
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey || e.metaKey) {
            // Key codes: 67=C, 65=A, 88=X, 83=S, 80=P
            if ([67, 65, 88, 83, 80].includes(e.keyCode)) {
                e.preventDefault();
                return false;
            }
        }
    }, { passive: false });

    // Prevent text selection via mouse
    document.addEventListener('selectstart', function(e) {
        e.preventDefault();
        return false;
    }, { passive: false });
});
    //JINA
    const PLAYER_NAME = "VIP USER"; 

    // === GAME STATE ===
    const gameState = {
        active: false,
        bombs: 2,
        mines: [],
        safeCells: [],
        revealed: [],
        gridSize: 25,
        bombOptions: [2, 3, 5, 7],
        recommendations: [],
        bestChoices: []
    };
    
    // === SAVE/LOAD GAME STATE ===
    const STORAGE_KEY = "mines_predictor_save";

    function saveGameState() {
        const saveData = {
            active: gameState.active,
            bombs: gameState.bombs,
            mines: gameState.mines,
            revealed: gameState.revealed,
            recommendations: gameState.recommendations,
            bestChoices: gameState.bestChoices,
            savedAt: Date.now()
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(saveData));
    }

    function loadGameState() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return false;
        
        try {
            const data = JSON.parse(saved);
            
            // Check if save is not too old (1 hour max)
            if (Date.now() - data.savedAt > 3600000) {
                localStorage.removeItem(STORAGE_KEY);
                return false;
            }
            
            // Restore game state
            gameState.active = data.active;
            gameState.bombs = data.bombs;
            gameState.mines = data.mines || [];
            gameState.revealed = data.revealed || [];
            gameState.recommendations = data.recommendations || [];
            gameState.bestChoices = data.bestChoices || [];
            
            return true;
        } catch (e) {
            localStorage.removeItem(STORAGE_KEY);
            return false;
        }
    }

    function clearGameState() {
        localStorage.removeItem(STORAGE_KEY);
    }

    // === DOM ELEMENTS ===
    const bombSelection = document.getElementById('bombSelection');
    const gameGrid = document.getElementById('gameGrid');
    const predictionDisplay = document.getElementById('predictionDisplay');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const loadingText = document.getElementById('loadingText');
    const safeCount = document.getElementById('safeCount');
    const bombCount = document.getElementById('bombCount');
    const accuracy = document.getElementById('accuracy');

    // === INITIALIZATION ===
    function initGame() {
        // Set player name
        document.getElementById('playerName').textContent = PLAYER_NAME;
        
        // Try to load saved game
        const hasSavedGame = loadGameState();
        
        renderBombSelection();
        renderGrid();
        setupEventListeners();
        
        // Initialize stats with "?" (unknown)
        safeCount.textContent = "?";
        bombCount.textContent = gameState.bombs;
        accuracy.textContent = "?";
        
        if (hasSavedGame && gameState.active) {
            // Restore the game display
            updateGameGrid();
            updateStats(); // Only show stats if game was saved
            updatePrediction("GAME RESTORED - CONTINUING...");
            showNotification("Game restored", "info");
        } else {
            // Show initial message with time
            const currentTime = getFormattedTime();
            updatePrediction(`SELECT BOMB COUNT AND START<br>
            Current time: <span class="cyber-highlight">${currentTime}</span>`);
        }
    }

    // === TIME FUNCTION ===
    function getFormattedTime() {
        const now = new Date();
        let hours = now.getHours();
        let minutes = now.getMinutes();
        const ampm = hours >= 12 ? 'PM' : 'AM';
        
        hours = hours % 12;
        hours = hours ? hours : 12; // 0 should be 12
        minutes = minutes < 10 ? '0' + minutes : minutes;
        
        return `${hours}:${minutes} ${ampm}`;
    }

    // === RENDER FUNCTIONS ===
    function renderBombSelection() {
        bombSelection.innerHTML = '';
        gameState.bombOptions.forEach(bombCount => {
            const btn = document.createElement('button');
            btn.className = 'cyber-btn';
            
            // Add color classes based on bomb count
            if (bombCount === 2 || bombCount === 3) {
                btn.classList.add('safe-bomb'); // Green outline
            } else if (bombCount >= 5) {
                btn.classList.add('high-risk'); // Red outline
            }
            
            // Add warning icon for high risk
            if (bombCount >= 5) {
                btn.classList.add('high-risk-btn');
            }
            
            // Selected state
            if (bombCount === gameState.bombs) {
                btn.classList.add('selected');
            }
            
            btn.textContent = bombCount;
            btn.onclick = () => selectBombs(bombCount);
            bombSelection.appendChild(btn);
        });
    }

    function renderGrid() {
        gameGrid.innerHTML = '';
        for (let i = 0; i < gameState.gridSize; i++) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell';
            cell.dataset.index = i;
            cell.textContent = '?';
            gameGrid.appendChild(cell);
        }
    }

    // === GAME LOGIC ===
    function selectBombs(count) {
        gameState.bombs = count;
        renderBombSelection();
        
        // Only show bomb count, others remain "?"
        bombCount.textContent = count;
        safeCount.textContent = "?";
        accuracy.textContent = "?";
        
        // Get current time for display
        const currentTime = getFormattedTime();
        
        // Show warning for high risk bombs (5+)
        if (count >= 5) {
            updatePrediction(`⚠️ <span class="danger-highlight">HIGH RISK WARNING!</span> ⚠️<br>
            ${count} BOMBS DETECTED - DANGER!<br>
            Survival probability: <span class="danger-highlight">${Math.round((25-count)/25*100)}%</span><br>
            Current time: <span class="cyber-highlight">${currentTime}</span><br>
            <span class="cyber-highlight">Advice: Choose lower bomb (2-3) for better odds</span>`);
        } else {
            updatePrediction(`BOMBS SET TO: ${count}. READY FOR ANALYSIS.<br>
            Current time: <span class="cyber-highlight">${currentTime}</span>`);
        }
    }

    async function startGame() {
        if (gameState.active) {
            showNotification("ANALYSIS ALREADY IN PROGRESS", "warning");
            return;
        }

        // Show loading animation
        showLoading(true);
        loadingText.textContent = "GENERATING MINEFIELD";
        
        // Show "loading..." in stats
        safeCount.innerHTML = '<span style="color: var(--neon-pink); animation: pulse 1.5s infinite;">loading...</span>';
        bombCount.textContent = gameState.bombs;
        accuracy.innerHTML = '<span style="color: var(--neon-pink); animation: pulse 1.5s infinite;">loading...</span>';
        
        await sleep(800);

        // Reset game state
        gameState.active = true;
        gameState.mines = [];
        gameState.safeCells = [];
        gameState.revealed = [];
        gameState.recommendations = [];
        gameState.bestChoices = [];

        // Generate mines
        const positions = Array.from({length: gameState.gridSize}, (_, i) => i);
        for (let i = 0; i < gameState.bombs; i++) {
            const randomIndex = Math.floor(Math.random() * positions.length);
            gameState.mines.push(positions[randomIndex]);
            positions.splice(randomIndex, 1);
        }

        // Generate safe cells (automatically reveal some)
        loadingText.textContent = "ANALYZING PATTERNS";
        await sleep(800);

        // Generate some safe cells to reveal (40-60% of safe cells)
        const totalSafe = gameState.gridSize - gameState.bombs;
        const cellsToReveal = Math.floor(totalSafe * (0.4 + Math.random() * 0.2));
        
        for (let i = 0; i < cellsToReveal; i++) {
            const safePositions = positions.filter(p => !gameState.mines.includes(p));
            if (safePositions.length === 0) break;
            
            const randomIndex = Math.floor(Math.random() * safePositions.length);
            const safeCell = safePositions[randomIndex];
            gameState.revealed.push(safeCell);
            positions.splice(positions.indexOf(safeCell), 1);
        }

        // Calculate recommendations
        loadingText.textContent = "CALCULATING PROBABILITIES";
        await sleep(800);
        calculateRecommendations();

        // For high-risk games (5+ bombs), only show safest 1 cell
        if (gameState.bombs >= 5) {
            gameState.recommendations = gameState.bestChoices.slice(0, 1);
        }

        // Update grid with animation
        loadingText.textContent = "RENDERING RESULTS";
        await sleep(600);
        showLoading(false);

        // Animate and reveal grid (stats will update at the end of this)
        await animateGridReveal();
    }

    function resetGame() {
        gameState.active = false;
        gameState.mines = [];
        gameState.safeCells = [];
        gameState.revealed = [];
        gameState.recommendations = [];
        gameState.bestChoices = [];

        // Reset stats display - show ? for unknown values
        safeCount.textContent = "?";
        bombCount.textContent = gameState.bombs;
        accuracy.textContent = "?";
        
        // Reset grid with animation
        document.querySelectorAll('.grid-cell').forEach((cell, index) => {
            cell.className = 'grid-cell';
            cell.textContent = '?';
            setTimeout(() => {
                cell.style.opacity = '0.5';
                setTimeout(() => {
                    cell.style.opacity = '1';
                }, 100);
            }, index * 20);
        });

        // Show reset message with time
        const currentTime = getFormattedTime();
        updatePrediction(`SYSTEM RESET. SELECT BOMBS AND START ANALYSIS.<br>
        Current time: <span class="cyber-highlight">${currentTime}</span>`);
        showNotification("SYSTEM RESET", "info");
        clearGameState();
    }
    
    function updateGameGrid() {
        const cells = document.querySelectorAll('.grid-cell');
        
        cells.forEach((cell, index) => {
            // Reset cell
            cell.className = 'grid-cell';
            cell.textContent = '?';
            
            if (gameState.mines.includes(index)) {
                // Show mine
                cell.classList.add('mine', 'revealed');
                cell.textContent = '💣';
            } else if (gameState.revealed.includes(index)) {
                // Show safe cell
                cell.classList.add('safe', 'revealed');
                cell.textContent = '💎';
            }
            
            // Add recommendations
            if (gameState.recommendations.includes(index)) {
                cell.classList.add('recommended');
            }
            if (gameState.bestChoices.includes(index)) {
                cell.classList.add('best-choice');
            }
            
            // Style safe cells
            if (!gameState.mines.includes(index)) {
                cell.classList.add('safe');
            }
        });
    }

    // === RECOMMENDATION SYSTEM ===
    function calculateRecommendations() {
        const allCells = Array.from({length: gameState.gridSize}, (_, i) => i);
        const unrevealedSafe = allCells.filter(i => 
            !gameState.mines.includes(i) && 
            !gameState.revealed.includes(i)
        );

        // Calculate safety scores based on distance from mines
        const scores = unrevealedSafe.map(index => {
            const neighbors = getNeighbors(index);
            const mineNeighbors = neighbors.filter(n => gameState.mines.includes(n));
            const safeNeighbors = neighbors.filter(n => 
                !gameState.mines.includes(n) && gameState.revealed.includes(n)
            );
            
            let score = 100; // Base score
            score -= mineNeighbors.length * 30; // Penalty for nearby mines
            score += safeNeighbors.length * 15; // Bonus for safe neighbors
            
            // Bonus for corner cells (statistically safer)
            const row = Math.floor(index / 5);
            const col = index % 5;
            if ((row === 0 || row === 4) && (col === 0 || col === 4)) {
                score += 10;
            }
            
            return { index, score };
        });

        // Sort by score (highest first)
        scores.sort((a, b) => b.score - a.score);

        // Get recommendations (top 3-4)
        const numRecommendations = Math.min(3, scores.length);
        gameState.recommendations = scores.slice(0, numRecommendations).map(s => s.index);

        // Get best choice (top score)
        if (scores.length > 0) {
            gameState.bestChoices = [scores[0].index];
        }
    }

    function getNeighbors(index) {
        const neighbors = [];
        const row = Math.floor(index / 5);
        const col = index % 5;
        
        for (let r = row - 1; r <= row + 1; r++) {
            for (let c = col - 1; c <= col + 1; c++) {
                if (r >= 0 && r < 5 && c >= 0 && c < 5 && !(r === row && c === col)) {
                    neighbors.push(r * 5 + c);
                }
            }
        }
        return neighbors;
    }

    // === ANIMATIONS ===
    async function animateGridReveal() {
        const cells = document.querySelectorAll('.grid-cell');
        
        // First, show all cells as loading
        for (let i = 0; i < cells.length; i++) {
            cells[i].classList.add('loading');
            cells[i].style.animationDelay = `${i * 0.05}s`;
        }
        
        await sleep(1500);

        // Reveal mines and safe cells
        for (let i = 0; i < cells.length; i++) {
            const cell = cells[i];
            cell.classList.remove('loading');
            
            if (gameState.mines.includes(i)) {
                // Mine cell
                cell.classList.add('mine', 'revealed');
                cell.textContent = '💣';
            } else {
                // ALL safe cells (revealed or not) should show diamond
                cell.classList.add('safe', 'revealed');
                cell.textContent = '💎';
            }
            
            // Add recommendation markers
            if (gameState.recommendations.includes(i)) {
                cell.classList.add('recommended');
            }
            if (gameState.bestChoices.includes(i)) {
                cell.classList.add('best-choice');
            }

            // Style ALL safe cells as green (even if not revealed)
            if (!gameState.mines.includes(i)) {
                cell.classList.add('safe');
            }

            // Animate reveal
            cell.style.animationDelay = `${i * 0.1}s`;
            cell.classList.add('revealed');
            
            await sleep(50);
        }

        // === UPDATE STATS HERE (AFTER ANIMATION COMPLETES) ===
        updateStats();
        showNotification("ANALYSIS COMPLETE", "success");
        saveGameState();

        // Update prediction display
        updatePredictionDisplay();
    }

    function showLoading(show) {
        if (show) {
            loadingOverlay.classList.add('active');
        } else {
            loadingOverlay.classList.remove('active');
        }
    }

    // === UI UPDATES ===
    function updatePrediction(message) {
        const predictionText = message
            .replace(/SAFE/gi, '<span class="cyber-highlight">$&</span>')
            .replace(/BOMB/gi, '<span class="danger-highlight">$&</span>')
            .replace(/\d+/g, '<span class="cyber-highlight">$&</span>');
        
        predictionDisplay.innerHTML = predictionText;
    }

    function updatePredictionDisplay() {
        if (gameState.recommendations.length > 0) {
            const recNumbers = gameState.recommendations.map(i => i + 1);
            const bestChoice = gameState.bestChoices[0] + 1;
            
            // Get current time
            const currentTime = getFormattedTime();
            
            let prediction = `SCANING <span class="cyber-highlight">COMPLETED</span> THESE ARE YOUR <span class="cyber-highlight">SAFE</span> PICKS FOR THIS ROUND 🟢<br><br>`;
            
            // Add time information
            prediction += `<span style="color: var(--neon-blue); font-size: 0.9rem;">
                ⏰ PREDICTION TIME: <span class="cyber-highlight">${currentTime}</span>
            </span><br>`;
            
            // Special warning for high-risk games
            if (gameState.bombs >= 5) {
                prediction += `<span class="danger-highlight">⚠️ HIGH RISK GAME ⚠️</span><br>`;
                prediction += `With ${gameState.bombs} bombs, survival chance: <span class="danger-highlight">${Math.round((25-gameState.bombs)/25*100)}%</span><br><br>`;
                prediction += `<span class="cyber-highlight">SAFEST SINGLE CELL: ${recNumbers[0]}</span><br>`;
                prediction += `Advice: <span class="danger-highlight">Play only 2 rounds</span>`;
            } else {
                prediction += `TOP RECOMMENDATIONS: <span class="cyber-highlight">${recNumbers.join(', ')}</span><br>`;
                prediction += `BEST CHOICE: <span class="cyber-highlight">${bestChoice}</span> (LOWEST RISK)<br><br>`;
                prediction += `<span class="danger-highlight">${gameState.mines.length} BOMBS</span> DETECTED IN GRID`;
            }
            
            predictionDisplay.innerHTML = prediction;
        } else {
            updatePrediction("ANALYSIS IN PROGRESS...");
        }
    }

    function updateStats() {
        safeCount.textContent = gameState.gridSize - gameState.bombs;
        bombCount.textContent = gameState.bombs;
        
        // Generate random accuracy between 95-100%
        const randomAccuracy = 95 + Math.floor(Math.random() * 6);
        accuracy.textContent = `${randomAccuracy}%`;
    }

    function showNotification(message, type = "info") {
        // Create notification element
        const notification = document.createElement('div');
        notification.style.cssText = `
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: ${type === 'success' ? 'var(--neon-green)' : 
                       type === 'warning' ? 'var(--neon-yellow)' : 
                       type === 'danger' ? 'var(--neon-red)' : 'var(--neon-blue)'};
            color: #000;
            padding: 12px 25px;
            border-radius: 30px;
            font-family: var(--font-cyber);
            font-weight: 700;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            z-index: 2000;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        `;
        notification.textContent = message;
        document.body.appendChild(notification);

        // Animate in
        setTimeout(() => {
            notification.style.opacity = '1';
            notification.style.top = '20px';
        }, 10);

        // Remove after delay
        setTimeout(() => {
            notification.style.opacity = '0';
            notification.style.top = '-50px';
            setTimeout(() => {
                document.body.removeChild(notification);
            }, 300);
        }, 2000);
    }

    // === UTILITY FUNCTIONS ===
    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    function setupEventListeners() {
        startBtn.onclick = startGame;
        resetBtn.onclick = resetGame;
    }
    
    // Save when page is about to be hidden
    document.addEventListener('visibilitychange', function() {
        if (document.hidden && gameState.active) {
            saveGameState();
        }
    });

    // Also save when user leaves the page
    window.addEventListener('beforeunload', function() {
        if (gameState.active) {
            saveGameState();
        }
    });

    // === INITIALIZE GAME ===
    document.addEventListener('DOMContentLoaded', initGame);
    
    
</script>
</body>
</html>
